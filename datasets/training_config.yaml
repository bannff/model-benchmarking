# MLX-LM LoRA Training Configuration - OPTIMIZED FOR 24GB RAM (4x batch size increase)
model: /Users/danielrodrigo/Workspace/PyScience/datasets/mlx_models/tinyllama_mlx
data: /Users/danielrodrigo/Workspace/PyScience/datasets/dataset_mlx_with_primus_token_fixed.jsonl  # Token-fixed PRIMUS dataset (840,658 samples, NO data loss)
valid_data: /Users/danielrodrigo/Workspace/PyScience/datasets/dataset_validation_mlx_with_primus_token_fixed.jsonl  # Token-fixed validation (71,189 samples)
train: true
fine_tune_type: lora
optimizer: adamw
batch_size: 4  # Back to original, let MLX handle memory efficiently
iters: 10000  # Increased for token-fixed dataset with 840,658 samples (NO data loss, more epochs for quality)
val_batches: 25  # Standard validation batches
learning_rate: 1e-4  # Conservative learning rate for stable convergence
steps_per_report: 25  # More frequent reporting due to faster training
steps_per_eval: 100   # More frequent evaluation due to faster convergence 
save_every: 400       # Save checkpoints every 400 steps (more frequent for large dataset)
max_seq_length: 512
mask_prompt: false
grad_checkpoint: true
seed: 42
num_layers: 22        # Increased to 22 layers for stronger adaptation (out of 32 total)
adapter_path: ./cybersecurity_finetuned_models/mlx_adapters_primus_enhanced_v1  # PRIMUS-enhanced version with 712K samples

# LoRA specific settings - enhanced parameters for stronger influence (α=128)
lora_parameters:
  rank: 32      # Increased to 32 for very high capacity with large dataset
  dropout: 0.1  # Increased to 0.1 for better regularization with 712K samples
  scale: 128.0  # Alpha=128 for maximum adapter influence (LoRA best practice)
  
# Warmup and scheduling for better convergence
warmup_steps: 200     # Warmup over 200 steps for stable start
weight_decay: 0.01    # Light weight decay for regularization
