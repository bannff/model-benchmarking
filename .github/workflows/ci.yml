name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint with ruff
        run: |
          ruff check src tests || (echo "Lint failed" && exit 1)

      - name: Type check with mypy
        run: |
          mypy src || (echo "Type check failed" && exit 1)

      - name: Install package
        run: |
          pip install .

      - name: Import check
        run: python3 -c "import sys; sys.path.insert(0, 'src'); import model_benchmarking; print('import ok', model_benchmarking)"

      - name: Run basic CLI help check
        run: mbenchmark --help

      - name: Run tests
        run: pytest -q

      - name: Build Docker image (local tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: model-benchmarking:ci

      - name: Publish to GHCR (if configured)
        if: secrets.GHCR_PAT
        env:
          CR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag model-benchmarking:ci ghcr.io/${{ github.repository_owner }}/model-benchmarking:latest
          docker push ghcr.io/${{ github.repository_owner }}/model-benchmarking:latest
