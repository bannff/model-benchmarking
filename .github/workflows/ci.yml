name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint with ruff
        run: |
          ruff check src tests || (echo "Lint failed" && exit 1)

      - name: Type check with mypy
        run: |
          mypy src || (echo "Type check failed" && exit 1)

      - name: Install package
        run: |
          pip install .

      - name: Import check
        run: python3 -c "import sys; sys.path.insert(0, 'src'); import model_benchmarking; print('import ok', model_benchmarking)"

      - name: Run basic CLI help check
        run: mbenchmark --help

      - name: Run tests
        run: pytest -q

      - name: Build Docker image (local tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: model-benchmarking:ci

      - name: Publish to GHCR (uses GITHUB_TOKEN, optional GHCR_PAT fallback)
        env:
          CR_PAT: ${{ secrets.GHCR_PAT || github.token }}
        run: |
          # Use the provided GHCR_PAT if set, otherwise GITHUB_TOKEN (works for in-repo publishing)
          echo "$CR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag model-benchmarking:ci ghcr.io/${{ github.repository_owner }}/model-benchmarking:latest
          docker push ghcr.io/${{ github.repository_owner }}/model-benchmarking:latest

  smoke-pipeline:
    name: Smoke pipeline (mock provider)
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true
          pip install .

      - name: Run pipeline with mock provider (skip cs-eval)
        run: |
          mbenchmark pipeline \
            --provider mock \
            --model mock \
            --max_questions 1 \
            --output_dir results \
            --skip-cs-eval \
            --verbose
