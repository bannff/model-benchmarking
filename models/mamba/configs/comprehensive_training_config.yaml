# MLX-LM LoRA Training Configuration for Comprehensive Cybersecurity Dataset
model: "mlx-community/mamba-1.4b-hf-f16"
train: true
data: "datasets"  # MLX-LM will look for train.jsonl in this directory
# Training configuration optimized for agentic truth-seeking behavior
lora_layers: 22
learning_rate: 5e-5  # Conservative rate to prevent divergence
max_seq_length: 1024  # Handle multi-turn conversations
batch_size: 1  # Memory efficient for complex conversations
iters: 600  # Sufficient for 125 high-quality samples
adapter_path: "comprehensive_cybersec_adapter"
save_every: 100
test: false
# Enhanced parameters for agentic behavior training
grad_checkpoint: true
seed: 42
