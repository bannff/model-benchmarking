# Example Rubric-based Evaluation Suite
# Demonstrates LLM-as-judge grading for open-ended responses

name: example-rubric
description: Open-ended evaluation with LLM-as-judge rubric grading

# Dataset path
dataset: ../../datasets/example_open_ended.jsonl

# Target configuration
target:
  provider: ollama
  model: ${MODEL:-llama3.2}
  temperature: 0.7

# Graders
graders:
  quality:
    kind: rubric
    # Inline prompt with template variables
    prompt: |
      You are evaluating an AI assistant's response to a question.
      
      Question: {{ input }}
      Expected answer guidance: {{ ground_truth }}
      Model's response: {{ submission }}
      
      Rate the response on a scale of 0.0 to 1.0 based on:
      - Accuracy: Is the information correct?
      - Completeness: Does it address the full question?
      - Clarity: Is the response clear and well-structured?
      
      Provide your rating as a JSON object:
      {"score": <float>, "rationale": "<explanation>"}
    model: ${JUDGE_MODEL:-llama3.2}
    temperature: 0.0

# Gate: require 70% average quality score
gate:
  metric_key: quality
  op: gte
  value: 0.7

max_samples: 50
max_concurrent: 3
