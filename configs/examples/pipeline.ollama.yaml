# Local Ollama-backed pipeline (requires Ollama running locally)
provider:
  name: ollama
  model: llama3.2
  host: http://localhost:11434
pipeline:
  output_dir: results
  max_questions: 2
  skip_cs_eval: false
  skip_cybergym: false
  skip_cve_bench: false
  verbose: true
cybergym:
  mode: sim
  difficulty: level1
cvebench:
